<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>InstaYou</title>
    <link rel="stylesheet" href="popup.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  </head>
  <body>
    <img src="Public/logo.png" alt="" style="height: 30px" />
    <p id="mainText">Upgrade Your Stalking Skills 🚀</p>
    <div id="statsInfo" class="stats-info">
      <p id="trackedCount">Loading...</p>
    </div>
    <img src="Public/blur.png" alt="" style="position: absolute; z-index: -99" />
    
    <div id="mainButtons" class="buttons">
      <button id="downloadBtn">Snatch User Stats 📥</button>
      <button id="compareBtn">Spot the Difference 👀</button>
      <button id="updateAllBtn">Update All Tracked 🔄</button>
    </div>
    <div class="upp">
      <button id="backButton" class="back-button">Back</button>
      <select id="sortSelect" class="sort-select" style="display: none;">
        <option value="name">Sort by Name</option>
        <option value="recent">Sort by Recent</option>
        <option value="followers">Sort by Followers</option>
      </select>
      <button id="exportBtn">Export Data 📤</button>
      <button id="clearListBtn">Yeet the List 🗑️</button>
    </div>
   

    <div id="userList"></div>
    <div id="compareResults"></div>
    
    <!-- Notes Modal -->
    <div id="notesModal" class="modal" style="display: none;">
      <div class="modal-content">
        <div class="modal-header">
          <h3 id="notesModalTitle">Add Notes</h3>
          <button id="closeModal" class="close-button">×</button>
        </div>
        <div class="modal-body">
          <textarea id="notesTextarea" placeholder="Add your notes about this profile..."></textarea>
        </div>
        <div class="modal-footer">
          <button id="saveNotes" class="save-button">Save</button>
          <button id="cancelNotes" class="cancel-button">Cancel</button>
        </div>
      </div>
    </div>
    
    <p id="author">
      Cooked up by  
      <a href="#" style="color: orangered; text-decoration: none">
        Ajmal Razaq Bhatti 🚀
      </a>
    </p>
    
    <script src="popup.js"></script>
  </body>
</html>
